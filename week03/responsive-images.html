<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A set of excercises to practice responsive images principles such as file size, sets of images based on viewport, etc.">
    <meta name="author" content="Axzam bendeck">
    <link rel="stylesheet" href="styles/responsive.css">
    <title>Responsive Images</title>
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-small.webp" alt="Atlanta Georgia Temple" width="1000" height="500">
            </picture>
        </div>
    </main>
</body>
</html>
