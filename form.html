<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Review our products providing your feedback answering a simple series of questions to help us improve our service">
    <meta name="author" content="Axzam Bendeck">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Product Review</title>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form action="review.html" method="get" class="productReview">
            <fieldset>
                <label>Product Name <select name="product" id="product" required>
                    <option value="" disabled selected>Choose a Product &#9662;</option>
                </select></label>

                <div>Overall Rating</div>
                <label class="starRating">⭐<input type="radio" name="starRating" id="1-star" value="1-star"></label>
                <label class="starRating">⭐⭐<input type="radio" name="starRating" id="2-star" value="2-star" required></label>
                <label class="starRating">⭐⭐⭐<input type="radio" name="starRating" id="3-star" value="3-star" required></label>
                <label class="starRating">⭐⭐⭐⭐<input type="radio" name="starRating" id="4-star" value="4-star" required></label>
                <label class="starRating">⭐⭐⭐⭐⭐<input type="radio" name="starRating" id="5-star" value="5-star" required></label>

                <label>Date of Installatiion <input type="date" name="installationDate" id="installationDate" required></label>

                <div>Which features did you find useful in the product? (Check all that apply)</div>
                <label class="features"><input type="checkbox" name="durability" id="durability" value="durability">Durability</label>
                <label class="features"><input type="checkbox" name="easeOfUse" id="easeOfUse" value="easeOfUse">Ease of Use</label>
                <label class="features"><input type="checkbox" name="performance" id="performance" value="performance">Performance</label>
                <label class="features"><input type="checkbox" name="design" id="design" value="design">Design</label>

                <label id="wReview">Written Review <span class="optional">(optional)</span><textarea name="writtenReview" id="writtenReview"></textarea></label>
                <label>Your Name <span class="optional">(optional)</span><input type="text" name="name" id="reviewer"></label>

                <input type="submit" value="Send My Review" id="button">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>©️<span id="currentyear"></span> Axzam Bendeck - Honduras</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
